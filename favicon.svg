<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f1117"/>

  <!-- Rising bars (indigo/blue) -->
  <rect x="3"  y="22" width="5" height="7"  rx="1.2" fill="#4f6ef7" opacity="0.85"/>
  <rect x="10" y="17" width="5" height="12" rx="1.2" fill="#4f6ef7" opacity="0.90"/>
  <rect x="17" y="12" width="5" height="17" rx="1.2" fill="#4f6ef7"/>
  <rect x="24" y="6"  width="5" height="23" rx="1.2" fill="#4f6ef7"/>

  <!-- Green trend line -->
  <polyline
    points="5.5,21 12.5,16 19.5,11 26.5,5"
    stroke="#22c55e" stroke-width="2.4"
    fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Peak dot -->
  <circle cx="26.5" cy="5" r="2.8" fill="#22c55e"/>
</svg>
